server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ontrack-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # Database schema is managed manually in Neon
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Custom Application Settings
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours in milliseconds
